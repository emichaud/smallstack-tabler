<!-- Theme Settings Offcanvas -->
<div class="offcanvas offcanvas-end offcanvas-narrow" tabindex="-1" id="offcanvas-settings" aria-labelledby="offcanvas-settings-title">
    <div class="offcanvas-header">
        <h2 class="offcanvas-title" id="offcanvas-settings-title">Theme Settings</h2>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column">
        <div>
            <!-- Color mode -->
            <div class="mb-4">
                <label class="form-label">Color mode</label>
                <p class="form-hint">Choose the color mode for your app.</p>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-theme" value="light" class="form-check-input" />
                        <div class="form-check-label">Light</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-theme" value="dark" class="form-check-input" />
                        <div class="form-check-label">Dark</div>
                    </div>
                </label>
            </div>

            <!-- Color scheme -->
            <div class="mb-4">
                <label class="form-label">Color scheme</label>
                <p class="form-hint">The accent color for your app.</p>
                <div class="row g-2">
                    <div class="col-auto">
                        <label class="form-colorinput">
                            <input name="stk-color" type="radio" value="amber" class="form-colorinput-input" />
                            <span class="form-colorinput-color" style="background-color: #f59f00;"></span>
                        </label>
                    </div>
                    <div class="col-auto">
                        <label class="form-colorinput">
                            <input name="stk-color" type="radio" value="blue" class="form-colorinput-input" />
                            <span class="form-colorinput-color" style="background-color: #206bc4;"></span>
                        </label>
                    </div>
                    <div class="col-auto">
                        <label class="form-colorinput">
                            <input name="stk-color" type="radio" value="azure" class="form-colorinput-input" />
                            <span class="form-colorinput-color" style="background-color: #4299e1;"></span>
                        </label>
                    </div>
                    <div class="col-auto">
                        <label class="form-colorinput">
                            <input name="stk-color" type="radio" value="indigo" class="form-colorinput-input" />
                            <span class="form-colorinput-color" style="background-color: #4263eb;"></span>
                        </label>
                    </div>
                    <div class="col-auto">
                        <label class="form-colorinput">
                            <input name="stk-color" type="radio" value="purple" class="form-colorinput-input" />
                            <span class="form-colorinput-color" style="background-color: #ae3ec9;"></span>
                        </label>
                    </div>
                    <div class="col-auto">
                        <label class="form-colorinput">
                            <input name="stk-color" type="radio" value="pink" class="form-colorinput-input" />
                            <span class="form-colorinput-color" style="background-color: #d6336c;"></span>
                        </label>
                    </div>
                    <div class="col-auto">
                        <label class="form-colorinput">
                            <input name="stk-color" type="radio" value="red" class="form-colorinput-input" />
                            <span class="form-colorinput-color" style="background-color: #d63939;"></span>
                        </label>
                    </div>
                    <div class="col-auto">
                        <label class="form-colorinput">
                            <input name="stk-color" type="radio" value="orange" class="form-colorinput-input" />
                            <span class="form-colorinput-color" style="background-color: #f76707;"></span>
                        </label>
                    </div>
                    <div class="col-auto">
                        <label class="form-colorinput">
                            <input name="stk-color" type="radio" value="green" class="form-colorinput-input" />
                            <span class="form-colorinput-color" style="background-color: #2fb344;"></span>
                        </label>
                    </div>
                    <div class="col-auto">
                        <label class="form-colorinput">
                            <input name="stk-color" type="radio" value="teal" class="form-colorinput-input" />
                            <span class="form-colorinput-color" style="background-color: #0ca678;"></span>
                        </label>
                    </div>
                    <div class="col-auto">
                        <label class="form-colorinput">
                            <input name="stk-color" type="radio" value="cyan" class="form-colorinput-input" />
                            <span class="form-colorinput-color" style="background-color: #17a2b8;"></span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Font family -->
            <div class="mb-4">
                <label class="form-label">Font family</label>
                <p class="form-hint">Choose the font family that fits your app.</p>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-font" value="sans-serif" class="form-check-input" />
                        <div class="form-check-label">Sans-serif</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-font" value="serif" class="form-check-input" />
                        <div class="form-check-label">Serif</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-font" value="monospace" class="form-check-input" />
                        <div class="form-check-label">Monospace</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-font" value="comic" class="form-check-input" />
                        <div class="form-check-label">Comic</div>
                    </div>
                </label>
            </div>

            <!-- Theme base -->
            <div class="mb-4">
                <label class="form-label">Theme base</label>
                <p class="form-hint">Choose the gray shade for your app.</p>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-base" value="slate" class="form-check-input" />
                        <div class="form-check-label">Slate</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-base" value="gray" class="form-check-input" />
                        <div class="form-check-label">Gray</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-base" value="zinc" class="form-check-input" />
                        <div class="form-check-label">Zinc</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-base" value="neutral" class="form-check-input" />
                        <div class="form-check-label">Neutral</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-base" value="stone" class="form-check-input" />
                        <div class="form-check-label">Stone</div>
                    </div>
                </label>
            </div>

            <!-- Corner Radius -->
            <div class="mb-4">
                <label class="form-label">Corner Radius</label>
                <p class="form-hint">Choose the border radius factor for your app.</p>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-radius" value="0" class="form-check-input" />
                        <div class="form-check-label">0</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-radius" value="0.5" class="form-check-input" />
                        <div class="form-check-label">0.5</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-radius" value="1" class="form-check-input" />
                        <div class="form-check-label">1</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-radius" value="1.5" class="form-check-input" />
                        <div class="form-check-label">1.5</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-radius" value="2" class="form-check-input" />
                        <div class="form-check-label">2</div>
                    </div>
                </label>
            </div>

            <!-- Layout -->
            <div class="mb-4">
                <label class="form-label">Layout</label>
                <p class="form-hint">Choose the page layout for your app.</p>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-layout" value="default" class="form-check-input" />
                        <div class="form-check-label">Horizontal</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-layout" value="boxed" class="form-check-input" />
                        <div class="form-check-label">Boxed</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-layout" value="condensed" class="form-check-input" />
                        <div class="form-check-label">Condensed</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-layout" value="fluid" class="form-check-input" />
                        <div class="form-check-label">Fluid</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-layout" value="navbar-dark" class="form-check-input" />
                        <div class="form-check-label">Navbar dark</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-layout" value="navbar-overlap" class="form-check-input" />
                        <div class="form-check-label">Navbar overlap</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-layout" value="navbar-sticky" class="form-check-input" />
                        <div class="form-check-label">Navbar sticky</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-layout" value="vertical" class="form-check-input" />
                        <div class="form-check-label">Vertical</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-layout" value="vertical-right" class="form-check-input" />
                        <div class="form-check-label">Right vertical</div>
                    </div>
                </label>
                <label class="form-check">
                    <div class="form-selectgroup-item">
                        <input type="radio" name="stk-layout" value="rtl" class="form-check-input" />
                        <div class="form-check-label">RTL mode</div>
                    </div>
                </label>
            </div>
        </div>

        <div class="mt-auto space-y">
            <button type="button" class="btn w-100" id="settings-reset">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-1">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                Reset to defaults
            </button>
        </div>
    </div>
</div>
