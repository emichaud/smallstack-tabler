<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden</title>
    <script>
    (function() {
        var theme = localStorage.getItem('smallstack-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        var palette = localStorage.getItem('smallstack-palette');
        if (palette && palette !== 'django') {
            document.documentElement.setAttribute('data-palette', palette);
        }
    })();
    </script>
    <style>
        :root { --bg: #1a1a2e; --text: #e0e0e0; --quiet: #999; --accent: #79aec8; --card-bg: #222; --border: #333; }
        [data-theme="light"] { --bg: #f5f5f5; --text: #333; --quiet: #777; --accent: #417690; --card-bg: #fff; --border: #ddd; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-page { text-align: center; max-width: 480px; padding: 2rem; }
        .error-code { font-size: 6rem; font-weight: 700; line-height: 1; color: var(--accent); opacity: 0.8; }
        .error-title { font-size: 1.5rem; font-weight: 600; margin: 0.5rem 0; }
        .error-message { color: var(--quiet); margin: 1rem 0 2rem; line-height: 1.6; }
        .error-home { display: inline-block; padding: 0.6rem 1.5rem; background: var(--accent); color: #fff; text-decoration: none; border-radius: 4px; font-size: 0.9rem; transition: opacity 0.2s; }
        .error-home:hover { opacity: 0.85; }
        .error-divider { width: 60px; height: 3px; background: var(--accent); margin: 1.5rem auto; opacity: 0.4; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">403</div>
        <h1 class="error-title">Forbidden</h1>
        <div class="error-divider"></div>
        <p class="error-message">You don't have permission to access this page. If you think this is a mistake, contact the site administrator.</p>
        <a href="/" class="error-home">Go Home</a>
    </div>
</body>
</html>
