<form method="POST" class="crud-form" {% if form.is_multipart %}enctype="multipart/form-data"{% endif %}>
    {% csrf_token %}
    {% for field in form %}
    <div class="crud-field{% if field.errors %} has-error{% endif %}">
        {% if field.field.widget.input_type == "checkbox" %}
        <div class="crud-checkbox">
            {{ field }}
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        </div>
        {% else %}
        <label class="crud-label" for="{{ field.id_for_label }}">
            {{ field.label }}{% if field.field.required %}<span class="required">*</span>{% endif %}
        </label>
        {{ field }}
        {% endif %}
        {% if field.help_text %}
        <p class="crud-help">{{ field.help_text }}</p>
        {% endif %}
        {% if field.errors %}
        <p class="crud-error">{{ field.errors.0 }}</p>
        {% endif %}
    </div>
    {% endfor %}
    <div class="crud-actions">
        <button type="submit" class="btn-save">Save</button>
        <a href="{{ list_view_url }}" class="btn-cancel">Cancel</a>
    </div>
</form>

<script>
// Wrap date/datetime-local/time inputs with a picker button
document.querySelectorAll('.crud-form input[type="date"], .crud-form input[type="datetime-local"], .crud-form input[type="time"]').forEach(function(input) {
    var wrapper = document.createElement('div');
    wrapper.className = 'crud-date-wrapper';
    input.parentNode.insertBefore(wrapper, input);
    wrapper.appendChild(input);

    var isTime = input.type === 'time';
    var svg = isTime
        ? '<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>'
        : '<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm-8 4H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>';

    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'crud-date-btn';
    btn.setAttribute('aria-label', isTime ? 'Open time picker' : 'Open calendar');
    btn.innerHTML = svg;
    btn.addEventListener('click', function() {
        if (input.showPicker) {
            input.showPicker();
        } else {
            input.focus();
            input.click();
        }
    });
    wrapper.appendChild(btn);
});
</script>
