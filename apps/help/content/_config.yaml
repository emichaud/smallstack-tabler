# Help System Configuration
# This file defines YOUR project's documentation structure
# SmallStack docs are bundled separately and auto-injected when enabled

title: "Help & Documentation"

# Variables available in markdown files using {{ variable }} syntax
variables:
  version: "1.0.0"
  project_name: "Your Project"
  python_version: "3.12"
  django_version: "6.0"

# Your project's documentation sections
sections:
  # Root section (project-specific docs)
  - slug: ""
    title: "Project Documentation"
    description: "Your project's documentation"
    pages:
      - slug: index
        title: "Welcome"
        description: "Project documentation home"
        icon: "home"
      - slug: getting-started
        title: "Getting Started"
        description: "First-run setup, branding, pages, and deployment basics"
        icon: "rocket"
      - slug: quick-setup
        title: "Quick Setup (TL;DR)"
        description: "Clone to deploy in 8 steps"
        icon: "rocket"

  # Add your own sections here:
  # - slug: guides
  #   title: "User Guides"
  #   description: "How to use this application"
  #   # Create folder: apps/help/content/guides/
  #   # Add pages: apps/help/content/guides/your-page.md

# Note: SmallStack reference docs are bundled in apps/help/smallstack/
# and appear automatically when SMALLSTACK_DOCS_ENABLED=True (default)
# To hide them, set SMALLSTACK_DOCS_ENABLED=False in settings
