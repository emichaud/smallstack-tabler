{% if messages %}
<div class="mt-2">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
        {{ message }}
        <a class="btn-close" data-bs-dismiss="alert" aria-label="Close"></a>
    </div>
    {% endfor %}
</div>
{% endif %}
