{% extends "preview/base_preview.html" %}

{% block title %}Forms{% endblock %}

{% block page_header %}
<div class="page-header d-print-none">
    <div class="container-xl">
        <div class="page-pretitle">Components</div>
        <h2 class="page-title">Forms</h2>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="row row-cards">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header"><h3 class="card-title">Basic form elements</h3></div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Text input</label>
                    <input type="text" class="form-control" placeholder="Enter text...">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="Password">
                </div>
                <div class="mb-3">
                    <label class="form-label">Textarea</label>
                    <textarea class="form-control" rows="4" placeholder="Write something..."></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Select</label>
                    <select class="form-select">
                        <option>Choose an option...</option>
                        <option>Option 1</option>
                        <option>Option 2</option>
                        <option>Option 3</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-check">
                        <input class="form-check-input" type="checkbox" checked>
                        <span class="form-check-label">Remember me</span>
                    </label>
                </div>
            </div>
            <div class="card-footer text-end">
                <button class="btn btn-primary">Submit</button>
            </div>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header"><h3 class="card-title">Input states</h3></div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Valid input</label>
                    <input type="text" class="form-control is-valid" value="Valid value">
                    <div class="valid-feedback">Looks good!</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Invalid input</label>
                    <input type="text" class="form-control is-invalid" value="Invalid value">
                    <div class="invalid-feedback">Please provide a valid value.</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Disabled input</label>
                    <input type="text" class="form-control" disabled value="Disabled">
                </div>
                <div class="mb-3">
                    <label class="form-label">Input with icon</label>
                    <div class="input-icon">
                        <span class="input-icon-addon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        </span>
                        <input type="text" class="form-control" placeholder="Search...">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Toggle switches</label>
                    <div>
                        <label class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" checked>
                            <span class="form-check-label">Active</span>
                        </label>
                        <label class="form-check form-switch">
                            <input class="form-check-input" type="checkbox">
                            <span class="form-check-label">Inactive</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
