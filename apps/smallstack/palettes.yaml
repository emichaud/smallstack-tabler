# SmallStack Color Palettes
# Each entry defines a selectable color palette.
# To add a new palette:
#   1. Add an entry here (id, label, description, preview colors)
#   2. Add CSS blocks to static/smallstack/css/palettes.css
#   3. Add choice to UserProfile.COLOR_PALETTE_CHOICES + migration
#   4. Add id to PalettePreferenceView.VALID_PALETTES

palettes:
  - id: django
    label: Django
    description: Classic Django admin colors
    preview:
      light: "#417690"
      dark: "#44b78b"

  - id: high-contrast
    label: Contrast
    description: Monochrome for accessibility
    preview:
      light: "#212121"
      dark: "#e0e0e0"

  - id: dark-blue
    label: Blue
    description: Deep ocean blue
    preview:
      light: "#1565c0"
      dark: "#42a5f5"

  - id: orange
    label: Orange
    description: Warm sunset orange
    preview:
      light: "#e65100"
      dark: "#ff9800"

  - id: purple
    label: Purple
    description: Rich violet tones
    preview:
      light: "#7e57c2"
      dark: "#b39ddb"
