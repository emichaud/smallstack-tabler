{% comment %}
Tabler-themed field preview modal (Bootstrap modal pattern).
Uses bootstrap.Modal API for show/hide instead of custom .open class toggle.
Include once at the bottom of any page that uses field preview triggers.
{% endcomment %}
<div class="modal modal-blur fade" id="fieldPreviewModal" tabindex="-1" role="dialog" aria-label="Field preview" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <div class="field-preview-tabs">
                    <button type="button" class="field-preview-tab active" data-format="text">Text</button>
                    <button type="button" class="field-preview-tab" data-format="markdown">MD</button>
                    <button type="button" class="field-preview-tab" data-format="json">JSON</button>
                </div>
                <div class="field-preview-actions">
                    <button type="button" class="field-preview-copy" id="fieldPreviewCopy" title="Copy to clipboard">
                        <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                        <span>Copy</span>
                    </button>
                    <button type="button" class="btn-close" onclick="closeFieldPreview()" aria-label="Close"></button>
                </div>
            </div>
            <div class="modal-body p-0">
                <div class="field-preview-content" id="field-preview-content">
                    <p class="text-secondary text-center" style="padding: 2rem;">Loading&hellip;</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function(){
    var modalEl = document.getElementById('fieldPreviewModal');
    if (!modalEl) return;
    var bsModal;
    document.addEventListener('DOMContentLoaded', function() {
        bsModal = new bootstrap.Modal(modalEl);
    });

    var contentEl = document.getElementById('field-preview-content');
    var copyBtn = document.getElementById('fieldPreviewCopy');
    var tabs = modalEl.querySelectorAll('.field-preview-tab');

    window.closeFieldPreview = function() {
        if (bsModal) bsModal.hide();
        contentEl.innerHTML = '<p class="text-secondary text-center" style="padding: 2rem;">Loading&hellip;</p>';
    };

    /* Open modal when HTMX trigger is clicked */
    document.addEventListener('click', function(e) {
        var trigger = e.target.closest('.field-preview-trigger[hx-get]');
        if (trigger) {
            if (bsModal) bsModal.show();
        }
    });

    /* After HTMX swaps content, activate the detected format tab */
    document.addEventListener('htmx:afterSwap', function(e) {
        if (e.detail.target === contentEl) {
            var activeTab = contentEl.querySelector('.field-preview-tab-content:not([style*="display:none"])');
            if (activeTab) {
                var fmt = activeTab.dataset.format;
                tabs.forEach(function(t) {
                    t.classList.toggle('active', t.dataset.format === fmt);
                });
            }
            /* Reset copy button */
            copyBtn.classList.remove('copied');
            copyBtn.querySelector('span').textContent = 'Copy';
        }
    });

    /* Tab switching - show/hide pre-rendered content */
    tabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
            var fmt = this.dataset.format;
            var panels = contentEl.querySelectorAll('.field-preview-tab-content');
            panels.forEach(function(p) {
                p.style.display = p.dataset.format === fmt ? '' : 'none';
            });
            tabs.forEach(function(t) {
                t.classList.toggle('active', t.dataset.format === fmt);
            });
            /* Reset copy button */
            copyBtn.classList.remove('copied');
            copyBtn.querySelector('span').textContent = 'Copy';
        });
    });

    /* Copy button - reads raw text from <template> tag */
    copyBtn.addEventListener('click', function() {
        var tpl = contentEl.querySelector('#field-preview-raw');
        var text = tpl ? tpl.content.textContent : '';
        navigator.clipboard.writeText(text).then(function() {
            copyBtn.classList.add('copied');
            copyBtn.querySelector('span').textContent = 'Copied';
            setTimeout(function() {
                copyBtn.classList.remove('copied');
                copyBtn.querySelector('span').textContent = 'Copy';
            }, 2000);
        });
    });

    /* Escape key */
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeFieldPreview();
    });
})();
</script>
