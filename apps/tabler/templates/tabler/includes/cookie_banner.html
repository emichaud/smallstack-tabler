{% if brand.cookie_banner %}
<div id="cookie-banner" class="cookie-banner" style="display:none; position:fixed; bottom:0; left:0; right:0; z-index:1050;">
    <div class="container-xl">
        <div class="alert alert-info d-flex align-items-center justify-content-between mb-0 rounded-0 rounded-top">
            <span>
                This site uses cookies to ensure you get the best experience.{% if brand.privacy_url %} <a href="{{ brand.privacy_url }}">Learn more</a>{% endif %}
            </span>
            <button class="btn btn-primary btn-sm ms-3" onclick="acceptCookies()">Accept</button>
        </div>
    </div>
</div>
<script>
(function() {
    if (!localStorage.getItem('cookie_consent')) {
        document.getElementById('cookie-banner').style.display = '';
    }
})();
function acceptCookies() {
    localStorage.setItem('cookie_consent', 'accepted');
    document.cookie = 'cookie_consent=accepted; path=/; max-age=31536000; SameSite=Lax';
    document.getElementById('cookie-banner').remove();
}
</script>
{% endif %}
