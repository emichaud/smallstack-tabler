<svg xmlns="http://www.w3.org/2000/svg" width="200" height="40" viewBox="0 0 200 40">
  <!-- 4-square grid icon (tabler-inspired) in SmallStack green -->
  <g transform="translate(2, 4)">
    <rect x="0" y="0" width="14" height="14" rx="2.5" fill="#0C4B33"/>
    <rect x="17" y="0" width="14" height="14" rx="2.5" fill="#1A6B4A"/>
    <rect x="0" y="17" width="14" height="14" rx="2.5" fill="#2BA977"/>
    <rect x="17" y="17" width="14" height="14" rx="2.5" fill="#4FD1A5"/>
  </g>

  <!-- Text: Django SmallStack (white for dark backgrounds) -->
  <text x="42" y="27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="500">
    <tspan fill="#ffffff">Django </tspan><tspan fill="#ffffff" font-weight="300">Small</tspan><tspan fill="#4FD1A5" font-weight="600">Stack</tspan>
  </text>
</svg>
