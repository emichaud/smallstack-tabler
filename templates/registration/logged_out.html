{% extends "registration/auth_base.html" %}

{% block title %}Logged Out{% endblock %}

{% block auth_content %}
<div class="auth-header">
    <h1>Logged Out</h1>
    <p>You have been successfully logged out.</p>
</div>

<div class="auth-footer-links">
    {% if smallstack_login_enabled %}
    <a href="{% url 'login' %}" class="button button-primary">Log In Again</a>
    {% endif %}
    <a href="{% url 'website:home' %}">Return to Home</a>
</div>
{% endblock %}
